name: gamefymobile
description: "Um aplicativo para incentivar a produtividade"
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.5.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/avatares/
    - assets/conquistas/

  fonts:
    - family: Jersey 10
      fonts:
        - asset: assets/fonts/Jersey10-Regular.ttf
